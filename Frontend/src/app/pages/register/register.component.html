<section class="auth-page">
  <div class="auth-card">
    <h1>Crear Cuenta</h1>

    <form (ngSubmit)="onSubmit()" #registerForm="ngForm">
      <!-- Email -->
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="email"
          required
          email
          #emailInput="ngModel"
          [class.ng-invalid]="emailInput.invalid && emailInput.touched"
        />
      </div>

      <!-- Usuario -->
      <div class="form-group">
        <label for="username">Usuario</label>
        <input
          type="text"
          id="username"
          name="username"
          [(ngModel)]="username"
          required
          minlength="3"
          #usernameInput="ngModel"
          [class.ng-invalid]="usernameInput.invalid && usernameInput.touched"
        />
      </div>

      <!-- Contraseña -->
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          name="password"
          [(ngModel)]="password"
          required
          minlength="6"
          #passwordInput="ngModel"
          [class.ng-invalid]="passwordInput.invalid && passwordInput.touched"
        />
      </div>

      <!-- Confirmar Contraseña -->
      <div class="form-group">
        <label for="confirmPassword">Confirmar Contraseña</label>
        <input
          type="password"
          id="confirmPassword"
          name="confirmPassword"
          [(ngModel)]="confirmPassword"
          required
          #confirmPasswordInput="ngModel"
          [class.ng-invalid]="confirmPasswordInput.invalid && confirmPasswordInput.touched"
        />
      </div>

      <!-- Mensajes de error específicos por campo -->
      <div class="field-error" *ngIf="emailInput.invalid && emailInput.touched">
        <span *ngIf="emailInput.errors?.['required']">El email es obligatorio</span>
        <span *ngIf="emailInput.errors?.['email']">El email no es válido</span>
      </div>

      <div class="field-error" *ngIf="usernameInput.invalid && usernameInput.touched">
        <span *ngIf="usernameInput.errors?.['required']">El usuario es obligatorio</span>
        <span *ngIf="usernameInput.errors?.['minlength']">Mínimo 3 caracteres</span>
      </div>

      <div class="field-error" *ngIf="passwordInput.invalid && passwordInput.touched">
        <span *ngIf="passwordInput.errors?.['required']">La contraseña es obligatoria</span>
        <span *ngIf="passwordInput.errors?.['minlength']">Mínimo 6 caracteres</span>
      </div>

      <div class="field-error" *ngIf="confirmPasswordInput.invalid && confirmPasswordInput.touched">
        <span *ngIf="confirmPasswordInput.errors?.['required']">Confirma tu contraseña</span>
      </div>

      <!-- Error de contraseñas no coinciden -->
      <div class="field-error" *ngIf="password && confirmPassword && password !== confirmPassword">
        Las contraseñas no coinciden
      </div>

      <!-- Mensajes de error/success del servidor -->
      <div class="error-message" *ngIf="errorMsg">
        {{ errorMsg }}
      </div>

      <div class="success-message" *ngIf="successMsg">
        {{ successMsg }}
      </div>

      <button type="submit" [disabled]="registerForm.invalid || cargando">
        {{ cargando ? 'Creando cuenta...' : 'Registrarse' }}
      </button>
    </form>

    <p class="auth-footer">
      ¿Ya tienes cuenta?
      <a routerLink="/login">Inicia sesión</a>
    </p>
  </div>
</section>
