<div class="register-container">
  <div class="register-card">
    <h2>Crear Cuenta</h2>
    
    <form (ngSubmit)="onSubmit()" #registerForm="ngForm">  <!-- 👈 CAMBIADO a onSubmit() -->
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="email"
          required
          email
          placeholder="tu@email.com">
      </div>

      <div class="form-group">
        <label for="username">Usuario</label>
        <input
          type="text"
          id="username"
          name="username"
          [(ngModel)]="username"
          required
          placeholder="Nombre de usuario">
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          name="password"
          [(ngModel)]="password"
          required
          minlength="6"
          placeholder="••••••••">
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmar Contraseña</label>
        <input
          type="password"
          id="confirmPassword"
          name="confirmPassword"
          [(ngModel)]="confirmPassword"
          required
          placeholder="••••••••">
      </div>

      <p class="error" *ngIf="errorMsg">{{ errorMsg }}</p>      <!-- 👈 errorMsg -->
      <p class="success" *ngIf="successMsg">{{ successMsg }}</p> <!-- 👈 successMsg -->

      <button 
        type="submit" 
        [disabled]="cargando || registerForm.invalid">  <!-- 👈 cargando -->
        {{ cargando ? 'Creando cuenta...' : 'Crear cuenta' }}
      </button>
    </form>

    <p class="login-link">
      ¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a>
    </p>
  </div>
</div>
