<section class="page">
  <h2>Listado de libros</h2>

  <div class="search-bar">
    <input
      type="text"
      placeholder="Buscar por título o autor..."
      [(ngModel)]="searchTerm"
      (input)="filtrarLibros()">
  </div>

  <div class="libros-grid">
    <div
      class="libro-card"
      *ngFor="let libro of librosFiltrados"
      (click)="verDetalle(libro.id)">
      <h3>{{ libro.titulo }}</h3>
      <p class="autor">{{ obtenerAutores(libro) }}</p>
      <p class="editorial" *ngIf="libro.editorial">
        {{ libro.editorial.nombre }}
      </p>
      <p class="anio" *ngIf="libro.anioPublicacion">
        {{ libro.anioPublicacion }}
      </p>
    </div>
  </div>
</section>
